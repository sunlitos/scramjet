<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sunlit</title>
    <link rel="icon" href="https://raw.githubusercontent.com/EXVYS/Image-host/main/logo2.png" />
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=Inter+Tight:ital,wght@0,100..900;1,100..900&family=Inter:wght@100..900&display=swap"
        rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Hind:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Hind:wght@300;400;500;600;700&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
        rel="stylesheet"
    />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body,
        html,
        #app {
            font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            width: 100vw;
            height: 100vh;
            background-color: #050505;
            overflow: hidden;
        }

        @keyframes fade {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .chrome {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: #0a0a0a;
            border-bottom: 1px solid #222;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        .chrome.hidden {
            transform: translateY(-100%);
        }

        .toolbar {
            height: 48px;
            min-height: 48px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 12px;
            width: 100%;
        }

        .nav-cluster {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }

        .icon-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            color: #888;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
            flex-shrink: 0;
        }

        .icon-btn:hover {
            background: #1a1a1a;
            color: #fff;
        }

        .icon-btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .omnibox {
            flex: 1;
            min-width: 0;
        }

        .omnibox-inner {
            height: 36px;
            background: #161616;
            border: 1px solid #222;
            border-radius: 18px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 10px;
            transition: all 0.2s ease;
            width: 100%;
        }

        .omnibox-inner:focus-within {
            background: #111;
            border-color: #888;
        }

        .omnibox svg {
            width: 16px;
            height: 16px;
            fill: #444;
            flex-shrink: 0;
        }

        .omnibox input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-size: 14px;
            font-family: inherit;
            min-width: 0;
        }

        .omnibox input::placeholder {
            color: #444;
        }

        .tab-strip {
            height: 38px;
            min-height: 38px;
            display: flex;
            align-items: flex-end;
            padding: 0 12px;
            gap: 6px;
            overflow-x: auto;
            scrollbar-width: none;
            width: 100%;
        }

        .tab-strip::-webkit-scrollbar {
            display: none;
        }

        .tab {
            height: 34px;
            min-width: 140px;
            max-width: 220px;
            background: transparent;
            border-radius: 10px 10px 0 0;
            display: flex;
            align-items: center;
            padding: 0 12px;
            gap: 10px;
            cursor: pointer;
            position: relative;
            transition: all 0.2s ease;
            border: 1px solid transparent;
            border-bottom: none;
            flex: 1;
        }

        .tab:hover {
            background: #1a1a1a;
        }

        .tab.active {
            background: #050505;
            border-color: #222;
            flex: 1.2;
        }

        .tab.active::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: #fff;
            border-radius: 10px 10px 0 0;
        }

        .tab-favicon {
            width: 18px;
            height: 18px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }

        .tab-favicon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .tab-title {
            flex: 1;
            font-size: 13px;
            color: #888;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
        }

        .tab.active .tab-title {
            color: #fff;
        }

        .tab-close {
            width: 18px;
            height: 18px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.15s ease;
            flex-shrink: 0;
        }

        .tab:hover .tab-close {
            opacity: 1;
        }

        .tab-close:hover {
            background: #222;
        }

        .tab-close svg {
            width: 14px;
            height: 14px;
            fill: #888;
            display: block;
        }

        .new-tab-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            color: #888;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 2px;
            transition: all 0.15s ease;
            flex-shrink: 0;
        }

        .new-tab-btn:hover {
            background: #1a1a1a;
            color: #fff;
        }

        .new-tab-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
            display: block;
        }

        .peek-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            z-index: 999;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .chrome.hidden ~ .peek-bar {
            opacity: 1;
        }

        .reveal-btn {
            position: fixed;
            top: 16px;
            right: 16px;
            width: 36px;
            height: 36px;
            background: #0a0a0a;
            border: 1px solid #222;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1001;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.3s ease;
            color: #888;
        }

        .chrome.hidden ~ .reveal-btn {
            opacity: 1;
            transform: translateY(0);
        }

        .reveal-btn:hover {
            background: #1a1a1a;
            color: #fff;
        }

        .reveal-btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
            transition: transform 0.3s ease;
        }

        .chrome.hidden ~ .reveal-btn svg {
            transform: rotate(180deg);
        }

        .content {
            position: fixed;
            top: 86px;
            left: 0;
            right: 0;
            bottom: 0;
            transition: top 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .chrome.hidden ~ .content {
            top: 0;
        }

        .new-tab-page {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 48px;
            padding: 40px;
        }

        .brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        .brand img {
            width: 120px;
            height: 120px;
            border-radius: 28px;
        }

        .brand h1 {
            font-size: 52px;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #fff 0%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-box {
            width: 100%;
            max-width: 680px;
        }

        .search-box-inner {
            height: 60px;
            background: #161616;
            border: 1px solid #222;
            border-radius: 30px;
            display: flex;
            align-items: center;
            padding: 0 28px;
            gap: 16px;
            transition: all 0.2s ease;
        }

        .search-box-inner:focus-within {
            background: #111;
            border-color: #888;
        }

        .search-box svg {
            width: 22px;
            height: 22px;
            fill: #444;
            flex-shrink: 0;
        }

        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-size: 17px;
            font-family: inherit;
        }

        .search-box input::placeholder {
            color: #444;
        }

        .shortcuts {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            max-width: 720px;
            width: 100%;
        }

        .shortcut {
            aspect-ratio: 1;
            background: #0a0a0a;
            border: 1px solid #222;
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            position: relative;
        }

        .shortcut:hover {
            background: #1a1a1a;
            transform: translateY(-4px);
            border-color: #444;
        }

        .shortcut-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .shortcut-icon img {
            width: 32px;
            height: 32px;
            object-fit: contain;
        }

        .shortcut-add {
            border-style: dashed;
        }

        .shortcut-add .shortcut-icon {
            background: transparent;
            border: 2px dashed #444;
            color: #444;
            font-size: 28px;
            font-weight: 300;
        }

        .shortcut span {
            font-size: 13px;
            color: #888;
            font-weight: 500;
            max-width: 80%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .frame-container {
            width: 100%;
            height: 100%;
            display: none;
        }

        .frame-container.active {
            display: block;
        }

        @media (max-width: 900px) {
            .tab {
                min-width: 120px;
                max-width: 180px;
            }
        }

        @media (max-width: 768px) {
            .shortcuts {
                grid-template-columns: repeat(3, 1fr);
            }
            
            .brand h1 {
                font-size: 40px;
            }
            
            .toolbar {
                padding: 0 12px;
                gap: 8px;
            }
            
            .tab {
                min-width: 100px;
                max-width: 140px;
            }
        }

        @media (max-width: 480px) {
            .tab {
                min-width: 80px;
                max-width: 120px;
            }
            
            .tab-title {
                font-size: 11px;
            }
        }

        @media (min-width: 1920px) {
            .toolbar {
                padding: 0 24px;
                height: 56px;
            }
            
            .tab-strip {
                height: 44px;
            }
            
            .tab {
                height: 40px;
            }
        }
    </style>

        defer
        data-domain="scramjet.mercurywork.shop"
        src="https://analytics.proudparrot2.com/js/script.js"
    ></script>

    <script src="config.js"></script>
    <script src="store.js"></script>
</head>
<body>
    <div class="chrome" id="chrome">
        <div class="toolbar">
            <div class="nav-cluster">
                <button class="icon-btn" onclick="back()">
                    <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
                </button>
                <button class="icon-btn" onclick="forward()">
                    <svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
                </button>
            </div>

            <div class="omnibox">
                <div class="omnibox-inner">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
                    <input type="text" id="omnibox" onkeypress="handleOmnibox(event)" />
                </div>
            </div>

            <div class="nav-cluster">
                <button class="icon-btn" onclick="toggleTheme()" id="themeBtn">
                    <svg viewBox="0 0 24 24"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                </button>
                <button class="icon-btn" onclick="toggleChrome()">
                    <svg viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7"/></svg>
                </button>
            </div>
        </div>

        <div class="tab-strip" id="tabStrip">
            <div class="tab active" onclick="switchTab(0)">
                <div class="tab-favicon"><img src="https://raw.githubusercontent.com/EXVYS/Image-host/main/logo2.png" /></div>
                <span class="tab-title">New Tab</span>
                <div class="tab-close" onclick="closeTab(event, 0)">
                    <svg viewBox="0 0 24 24" width="14" height="14"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" fill="none"/></svg>
                </div>
            </div>
            <button class="new-tab-btn" onclick="addTab()" title="New Tab">
                <svg viewBox="0 0 24 24" width="20" height="20"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" fill="none"/></svg>
            </button>
        </div>
    </div>

    <div class="peek-bar" onclick="showChrome()"></div>
    <button class="reveal-btn" onclick="toggleChrome()">
        <svg viewBox="0 0 24 24"><path d="M18 15l-6-6-6 6"/></svg>
    </button>

    <div class="content">
        <div class="new-tab-page" id="newTabPage">
            <div class="brand">
                <img src="https://raw.githubusercontent.com/EXVYS/Image-host/main/logo2.png" alt="Sunlit" />
                <h1>Sunlit</h1>
            </div>
            
            <div class="search-box">
                <div class="search-box-inner">
                    <svg viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    <input type="text" id="homeSearch" onkeypress="handleHomeSearch(event)" />
                </div>
            </div>

            <div class="shortcuts" id="shortcuts">
                <div class="shortcut" onclick="navigate('https://google.com')">
                    <div class="shortcut-icon">
                        <img src="https://www.google.com/favicon.ico" alt="Google" />
                    </div>
                    <span>Google</span>
                </div>
                <div class="shortcut" onclick="navigate('https://youtube.com')">
                    <div class="shortcut-icon">
                        <img src="https://www.youtube.com/favicon.ico" alt="YouTube" />
                    </div>
                    <span>YouTube</span>
                </div>
                <div class="shortcut" onclick="navigate('https://github.com')">
                    <div class="shortcut-icon">
                        <img src="https://github.com/favicon.ico" alt="GitHub" />
                    </div>
                    <span>GitHub</span>
                </div>
                <div class="shortcut" onclick="navigate('https://reddit.com')">
                    <div class="shortcut-icon">
                        <img src="https://www.reddit.com/favicon.ico" alt="Reddit" />
                    </div>
                    <span>Reddit</span>
                </div>
                <div class="shortcut shortcut-add" onclick="addShortcut()">
                    <div class="shortcut-icon">+</div>
                    <span>Add</span>
                </div>
            </div>
        </div>

        <div class="frame-container" id="frameContainer">
            <div id="app"></div>
        </div>
    </div>

    <script src="ui.js"></script>
    <script>
        let isChromeHidden = false;
        let isDark = true;
        let tabs = [{ title: 'New Tab', url: null, id: 0 }];
        let activeTabId = 0;
        let tabCounter = 1;
        let customShortcuts = [];

        function toggleChrome() {
            isChromeHidden = !isChromeHidden;
            document.getElementById('chrome').classList.toggle('hidden', isChromeHidden);
        }

        function showChrome() {
            if (isChromeHidden) {
                isChromeHidden = false;
                document.getElementById('chrome').classList.remove('hidden');
            }
        }

        function toggleTheme() {
            isDark = !isDark;
            document.body.classList.toggle('light', !isDark);
            const btn = document.getElementById('themeBtn');
            btn.innerHTML = isDark 
                ? '<svg viewBox="0 0 24 24"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>'
                : '<svg viewBox="0 0 24 24"><path d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>';
        }

        function addTab() {
            const id = tabCounter++;
            tabs.push({ title: 'New Tab', url: null, id });
            
            const strip = document.getElementById('tabStrip');
            const newTabBtn = strip.querySelector('.new-tab-btn');
            const newTab = document.createElement('div');
            newTab.className = 'tab';
            newTab.onclick = () => switchTab(id);
            newTab.innerHTML = `
                <div class="tab-favicon"><img src="https://raw.githubusercontent.com/EXVYS/Image-host/main/logo2.png" /></div>
                <span class="tab-title">New Tab</span>
                <div class="tab-close" onclick="closeTab(event, ${id})">
                    <svg viewBox="0 0 24 24" width="14" height="14"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" fill="none"/></svg>
                </div>
            `;
            strip.insertBefore(newTab, newTabBtn);
            switchTab(id);
        }

        function switchTab(id) {
            activeTabId = id;
            const tabEls = document.querySelectorAll('.tab');
            tabEls.forEach((el) => {
                el.classList.remove('active');
            });
            
            const targetTab = Array.from(tabEls).find((el, idx) => tabs[idx] && tabs[idx].id === id);
            if (targetTab) targetTab.classList.add('active');

            const tab = tabs.find(t => t.id === id);
            if (tab && tab.url) {
                showFrame();
                document.getElementById('omnibox').value = tab.url;
            } else {
                showNewTab();
            }
        }

        function closeTab(e, id) {
            e.stopPropagation();
            if (tabs.length <= 1) return;
            
            const idx = tabs.findIndex(t => t.id === id);
            tabs = tabs.filter(t => t.id !== id);
            
            const tabEls = document.querySelectorAll('.tab');
            tabEls[idx].remove();
            
            if (activeTabId === id) {
                const newIdx = Math.min(idx, tabs.length - 1);
                switchTab(tabs[newIdx].id);
            }
        }

        function showNewTab() {
            document.getElementById('newTabPage').style.display = 'flex';
            document.getElementById('frameContainer').classList.remove('active');
            document.getElementById('omnibox').value = '';
        }

        function showFrame() {
            document.getElementById('newTabPage').style.display = 'none';
            document.getElementById('frameContainer').classList.add('active');
        }

        function isValidUrl(string) {
            const urlPattern = /^(https?:\/\/)?([\da-z\.-]+)\.([a-z\.]{2,6})([\/\w \.-]*)*\/?$/;
            return urlPattern.test(string);
        }

        function processInput(input) {
            input = input.trim();
            if (!input) return null;
            
            if (input.includes('.') && !input.includes(' ') && isValidUrl(input)) {
                if (!input.startsWith('http')) {
                    return 'https://' + input;
                }
                return input;
            } else {
                return 'https://www.google.com/search?q=' + encodeURIComponent(input);
            }
        }

        function navigate(url) {
            const processed = processInput(url);
            if (!processed) return;
            
            const tab = tabs.find(t => t.id === activeTabId);
            if (tab) {
                tab.url = processed;
                tab.title = processed.replace(/^https?:\/\//, '').split('/')[0];
                if (processed.includes('google.com/search')) {
                    tab.title = 'Google Search';
                }
                updateTabUI(activeTabId, tab.title, processed);
            }
            
            showFrame();
            document.getElementById('omnibox').value = processed;
        }

        function updateTabUI(id, title, url) {
            const idx = tabs.findIndex(t => t.id === id);
            const tabEls = document.querySelectorAll('.tab');
            if (tabEls[idx]) {
                tabEls[idx].querySelector('.tab-title').textContent = title;
                let faviconUrl;
                if (url.includes('google.com/search')) {
                    faviconUrl = 'https://www.google.com/favicon.ico';
                } else {
                    const domain = url.replace(/^https?:\/\//, '').split('/')[0];
                    faviconUrl = `https://${domain}/favicon.ico`;
                }
                tabEls[idx].querySelector('.tab-favicon').innerHTML = `<img src="${faviconUrl}" onerror="this.src='https://raw.githubusercontent.com/EXVYS/Image-host/main/logo2.png'" />`;
            }
        }

        function addShortcut() {
            const url = prompt('Enter website URL:');
            if (!url) return;
            
            const name = prompt('Enter website name:') || 'Shortcut';
            const cleanUrl = url.startsWith('http') ? url : 'https://' + url;
            const domain = cleanUrl.replace(/^https?:\/\//, '').split('/')[0];
            
            const shortcutsContainer = document.getElementById('shortcuts');
            const addBtn = shortcutsContainer.querySelector('.shortcut-add');
            
            const shortcut = document.createElement('div');
            shortcut.className = 'shortcut';
            shortcut.onclick = () => navigate(cleanUrl);
            shortcut.innerHTML = `
                <div class="shortcut-icon">
                    <img src="https://${domain}/favicon.ico" onerror="this.src='https://raw.githubusercontent.com/EXVYS/Image-host/main/logo2.png'" />
                </div>
                <span>${name}</span>
            `;
            
            shortcutsContainer.insertBefore(shortcut, addBtn);
            customShortcuts.push({ url: cleanUrl, name, domain });
        }

        function handleOmnibox(e) {
            if (e.key === 'Enter') {
                navigate(e.target.value);
            }
        }

        function handleHomeSearch(e) {
            if (e.key === 'Enter') {
                navigate(e.target.value);
                e.target.value = '';
            }
        }

        function back() { history.back(); }
        function forward() { history.forward(); }
        function reload() { location.reload(); }
    </script>
</body>
</html>
